<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отчёт - Стяжка Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      border-bottom: 3px solid #2563eb;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .header h1 { color: #1e3a8a; font-size: 28px; margin-bottom: 8px; }
    .header .subtitle { color: #64748b; font-size: 14px; }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }
    .info-card {
      background: #f8fafc;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
    }
    .info-card label {
      display: block;
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .info-card .value {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 30px;
    }
    .metric-box {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    .metric-box .label { font-size: 11px; opacity: 0.9; margin-bottom: 5px; }
    .metric-box .value { font-size: 20px; font-weight: 700; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 25px;
      font-size: 14px;
    }
    th {
      background: #1e3a8a;
      color: white;
      padding: 12px 10px;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #e2e8f0;
    }
    tr:nth-child(even) { background: #f8fafc; }
    .total-row {
      background: #eff6ff !important;
      font-weight: 700;
      font-size: 16px;
    }
    .total-row td {
      border-top: 2px solid #2563eb;
      padding-top: 15px;
      color: #1e3a8a;
    }
    .actions {
      margin-top: 30px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #2563eb; color: white; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-success { background: #10b981; color: white; }
    @media print {
      .actions { display: none; }
      body { background: white; padding: 0; }
      .container { box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="reportTitle">ЛИСТ ЗАМЕРА</h1>
      <div class="subtitle">Расчёт устройства стяжки пола</div>
    </div>

    <div class="info-grid" id="clientInfo">
      <div class="info-card">
        <label>Адрес объекта</label>
        <div class="value" id="address">-</div>
      </div>
      <div class="info-card">
        <label>Заказчик</label>
        <div class="value" id="client">-</div>
      </div>
      <div class="info-card">
        <label>Дата замера</label>
        <div class="value" id="date">-</div>
      </div>
      <div class="info-card">
        <label>Документ №</label>
        <div class="value" id="docNum">-</div>
      </div>
    </div>

    <div class="metrics" id="metrics">
      <div class="metric-box">
        <div class="label">Площадь</div>
        <div class="value" id="totalArea">0 м²</div>
      </div>
      <div class="metric-box">
        <div class="label">Средний слой</div>
        <div class="value" id="avgLayer">0 см</div>
      </div>
      <div class="metric-box">
        <div class="label">Объём</div>
        <div class="value" id="totalVolume">0 м³</div>
      </div>
      <div class="metric-box">
        <div class="label">Индекс</div>
        <div class="value" id="totalIndex">0</div>
      </div>
    </div>

    <h3 style="margin-bottom:15px; color:#1e293b;">Детализация по помещениям</h3>
    <table id="roomsTable">
      <thead>
        <tr>
          <th>Помещение</th>
          <th style="text-align:right">Площадь, м²</th>
          <th style="text-align:right">Слой, см</th>
          <th style="text-align:right">Итог (S×h)</th>
        </tr>
      </thead>
      <tbody id="roomsBody"></tbody>
    </table>

    <div class="actions">
      <button class="btn btn-primary" onclick="window.print()">🖨 Печать / PDF</button>
      <button class="btn btn-secondary" onclick="copyToClipboard()">📋 Копировать</button>
      <button class="btn btn-success" onclick="backToApp()">← Назад</button>
    </div>
  </div>

  <script>
    // Загрузка данных из localStorage
    function loadReport() {
      const urlParams = new URLSearchParams(window.location.search);
      const type = urlParams.get('type');
      const id = urlParams.get('id');
      
      const db = JSON.parse(localStorage.getItem('screed_final') || '[]');
      const measurement = db.find(m => m.id === id);
      
      if (!measurement) {
        alert('Замер не найден!');
        return;
      }

      // Заполняем данные
      document.getElementById('address').textContent = measurement.address;
      document.getElementById('client').textContent = measurement.client || 'Не указан';
      document.getElementById('date').textContent = measurement.date;
      document.getElementById('docNum').textContent = '№' + Math.floor(1000 + Math.random() * 9000);
      
      document.getElementById('totalArea').textContent = measurement.totalArea.toFixed(2) + ' м²';
      document.getElementById('avgLayer').textContent = measurement.avgLayer.toFixed(2) + ' см';
      document.getElementById('totalVolume').textContent = (measurement.totalArea * measurement.avgLayer / 100).toFixed(2) + ' м³';
      document.getElementById('totalIndex').textContent = (measurement.totalArea * measurement.avgLayer).toFixed(2);

      // Заполняем таблицу комнат
      const tbody = document.getElementById('roomsBody');
      let totalIndex = 0;
      
      measurement.rooms.forEach(room => {
        const area = parseFloat(room.area) || 0;
        const layer = parseFloat(room.layer) || 0;
        const index = area * layer;
        totalIndex += index;
        
        if (area > 0) {
          tbody.innerHTML += `
            <tr>
              <td>${room.name}</td>
              <td style="text-align:right">${area.toFixed(2)}</td>
              <td style="text-align:right">${layer.toFixed(1)}</td>
              <td style="text-align:right; font-weight:600">${index.toFixed(2)}</td>
            </tr>
          `;
        }
      });
      
      document.getElementById('totalIndex').textContent = totalIndex.toFixed(2);
    }

    function copyToClipboard() {
      const text = document.body.innerText;
      navigator.clipboard.writeText(text).then(() => {
        alert('📋 Скопировано в буфер обмена!');
      });
    }

    function backToApp() {
      window.location.href = 'index.html';
    }

    // Загружаем данные при старте
    window.addEventListener('DOMContentLoaded', loadReport);
  </script>
</body>
</html>
